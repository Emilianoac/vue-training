documentId: routes-and-navigation-with-vue-router
title: Rutas y navegación con Vue Router
level: intermediate
slug: routes-and-navigation-with-vue-router
description: Este cuestionario se centra en la configuración y el uso de Vue
  Router, incluyendo la definición de rutas, navegación y anidación de rutas en
  aplicaciones Vue.
category:
  name: Vue Router
  image:
    url: https://res.cloudinary.com/du6pa3pa5/image/upload/v1765247921/vue-training/vue_0b0e7956d5.png
questions:
  - text: ¿Cuál de las siguientes opciones permite configurar Vue Router
      para usar el modo de historial HTML5?
    explanation: "La función createWebHistory permite configurar Vue
      Router para utilizar el historial HTML5, lo que elimina el hash # en la
      URL y permite rutas limpias."
    explanation_code:
      - code: |-
          import { createRouter, createWebHistory } from "vue-router";

          import Home from "./views/Home.vue";
          import About from "./views/About.vue";

          const routes = [
            { path: "/", component: Home },
            { path: "/about", component: About }
          ];

          // Crear el router con historial HTML5
          const router = createRouter({
            history: createWebHistory(),
            routes
          });

          export default router;
        language: javascript
    answers:
      - id: "1"
        isCorrect: false
        text: "`createWebHashHistory()`"
      - id: "2"
        isCorrect: true
        text: "`createWebHistory()`"
      - id: "3"
        isCorrect: false
        text: "`useHistoryMode()`"
      - id: "4"
        isCorrect: false
        text: "`historyMode: 'html5'`"
  - text: ¿Cómo se navega programáticamente a una ruta en Vue Router?
    explanation: Para navegar programáticamente, se utiliza
      `router.push()`, que permite cambiar la ruta actual a la que se pasa como
      argumento.
    explanation_code:
      - code: |-
          <script setup>
          import { useRouter } from "vue-router";

          const router = useRouter();
           function gotToAbout() {
           router.push("/about");
          }
          </script>

          <template>
            <div>
              <h1>Bienvenido a la página principal</h1>
              <button @click="gotToAbout">Ir a About</button>
            </div>
          </template>
        language: handlebars
    answers:
      - id: "1"
        isCorrect: true
        text: Usando `router.push()`.
      - id: "2"
        isCorrect: false
        text: Llamando a `navigate()`.
      - id: "3"
        isCorrect: false
        text: Usando `this.navigate()`.
      - id: "4"
        isCorrect: false
        text: Modificando `window.location`.
  - text: ¿Qué opción permite definir rutas anidadas en Vue Router?
    explanation: La opción 'children' permite definir rutas anidadas,
      donde una ruta padre puede tener varias rutas hijas, facilitando la
      creación de estructuras de navegación complejas.
    explanation_code:
      - code: |-
          const routes = [
            {
              path: "/dashboard",
              component: Dashboard,
              children: [
                { path: "profile" component: UserProfile }
              ]
            }
          ];
        language: javascript
    answers:
      - id: "1"
        isCorrect: true
        text: "`children`"
      - id: "2"
        isCorrect: false
        text: "`nestedRoutes`"
      - id: "3"
        isCorrect: false
        text: "`subRoutes`"
      - id: "4"
        isCorrect: false
        text: "`parent`"
  - text: ¿Cuál es el propósito principal de Vue Router en una aplicación Vue?
    explanation: Vue Router permite gestionar la navegación entre
      diferentes vistas o componentes en una aplicación Vue, facilitando la
      creación de aplicaciones de una sola página (SPA).
    explanation_code: []
    answers:
      - id: "1"
        isCorrect: false
        text: Manejar el estado global.
      - id: "2"
        isCorrect: false
        text: Realizar pruebas unitarias.
      - id: "3"
        isCorrect: true
        text: Gestionar la navegación entre diferentes vistas.
      - id: "4"
        isCorrect: false
        text: Mejorar el rendimiento de la aplicación.
  - text: ¿Cómo se define una ruta en Vue Router?
    explanation: Las rutas en Vue Router se definen como objetos dentro
      de un array, especificando la ruta y el componente que debe renderizarse.
    explanation_code:
      - code: |-
          const routes = [
            { path: "/home", component: Home }
          ];
        language: javascript
    answers:
      - id: "1"
        isCorrect: false
        text: Usando `defineRoute()`.
      - id: "2"
        isCorrect: true
        text: Mediante un objeto en un array de rutas.
      - id: "3"
        isCorrect: false
        text: Usando `createRoute()`.
      - id: "4"
        isCorrect: false
        text: Usando `addRoute()` en el componente.
  - text: ¿Qué función se utiliza para crear una instancia de Vue Router?
    explanation: "`createRouter()` es la función que se utiliza para
      crear una nueva instancia de Vue Router, permitiendo definir la
      configuración y las rutas."
    explanation_code:
      - code: |-
          import { createRouter, createWebHistory } from "vue-router";

          const routes = [
            { path: "/", component: Home },
            { path: "/about", component: About }
          ];

          const router = createRouter({
            history: createWebHistory(),
            routes
          });

          export default router;
        language: javascript
    answers:
      - id: "1"
        isCorrect: true
        text: "`createRouter()`"
      - id: "2"
        isCorrect: false
        text: "`initRouter()`"
      - id: "3"
        isCorrect: false
        text: "`new Router()`"
      - id: "4"
        isCorrect: false
        text: "`setupRouter()`"
  - text: ¿Cómo se implementa la navegación con enlaces en Vue Router?
    explanation: El componente `<router-link>` se utiliza para crear
      enlaces de navegación que permiten cambiar de ruta sin recargar la página.
    explanation_code:
      - code: |-
          <template>
            <div>
              <h1>Bienvenido a la página principal</h1>
              <router-link to="/profile">Ir a mi perfil</router-link>
            </div>
          </template>
        language: handlebars
    answers:
      - id: "1"
        isCorrect: false
        text: Usando `<a href='/ruta'>`.
      - id: "2"
        isCorrect: true
        text: Con el componente `<router-link>`.
      - id: "3"
        isCorrect: false
        text: Llamando a `router.navigate()`.
      - id: "4"
        isCorrect: false
        text: Modificando `window.location`.
  - text: ¿Cómo se establece una subruta por defecto en una ruta anidada en
      Vue Router?
    explanation: "Para establecer una subruta por defecto en una ruta
      anidada, se define una subruta con un path vacio `path: ''` dentro de
      children. Esto hace que cuando el usuario acceda a la ruta padre, Vue
      Router cargue automáticamente la subruta por defecto sin cambiar la URL."
    explanation_code:
      - code: |-
          const routes = [
            {
              path: "/dashboard",
              component: Dashboard,
              children: [
                { path: "", component: Profile } // Subruta por defecto
              ]
            }
          ];
        language: javascript
    answers:
      - id: "1"
        isCorrect: false
        text: "Definiendo una propiedad `default: true`."
      - id: "2"
        isCorrect: false
        text: Usando el atributo `default` en `children`.
      - id: "3"
        isCorrect: true
        text: "Definiendo una subruta con un path vacío `path: ' '`."
      - id: "4"
        isCorrect: false
        text: Usando el atributo defaultRoute.
  - text: ¿Cómo puedes definir una ruta dinámica en Vue Router?
    explanation: En Vue Router, una ruta dinámica se define usando
      parámetros dinámicos, que se indican con dos puntos `:` seguidos del
      nombre del parámetro.
    explanation_code:
      - code: |-
          import { createRouter, createWebHistory } from "vue-router";

          const routes = [
            {
              path: "/user/:id" // Ruta dinámica con parámetro :id
              name: "UserProfile",
              component: () => import('@/views/UserProfile.vue')
            },
          ];

          const router = createRouter({
            history: createWebHistory(),
            routes,
          });

          export default router;
        language: javascript
    answers:
      - id: "1"
        isCorrect: false
        text: Usando corchetes `[ ]`.
      - id: "2"
        isCorrect: false
        text: Con un asterisco `*`.
      - id: "3"
        isCorrect: false
        text: Usando paréntesis `( )`.
      - id: "4"
        isCorrect: true
        text: Con dos puntos `:` seguidos del nombre del parámetro.
  - text: ¿Cómo se puede cargar un componente de forma perezosa (lazy
      loading) en una ruta de Vue Router?
    explanation: Para cargar un componente de forma perezosa en una
      ruta de Vue Router, se utiliza una función de importación dinámica que
      devuelve una promesa con el componente.
    explanation_code:
      - code: |-
          const routes = [
            {
              path: "/about",
              component: () => import("./views/About.vue") // Carga perezosa
            }
          ];
        language: javascript
    answers:
      - id: "1"
        isCorrect: false
        text: Importando el componente con la función `loadComponent()`.
      - id: "2"
        isCorrect: false
        text: Importando el componente con la función `dynamicImport()`.
      - id: "3"
        isCorrect: false
        text: Importando el componente con la función `import()`.
      - id: "4"
        isCorrect: true
        text: Importado el componente con `() => import(...)`.
