documentId: introduction-to-pinia
title: Introducción a Pinia
level: basic
slug: introduction-to-pinia
description: Este cuestionario cubre los conceptos básicos de Pinia, el gestor
  de estado para Vue 3.
category:
  name: Pinia
  image:
    url: https://res.cloudinary.com/du6pa3pa5/image/upload/v1765247921/vue-training/pinia_6fe4d6accb.png
questions:
  - text: ¿Cuál es el propósito principal de Pinia en Vue 3?
    explanation: Pinia es una biblioteca para la gestión de estado en
      Vue, que permite almacenar y compartir el estado de la aplicación en
      diferentes componentes.
    explanation_code: []
    answers:
      - id: "1"
        isCorrect: false
        text: Integrar componentes de terceros.
      - id: "2"
        isCorrect: true
        text: Gestionar el estado global de la aplicación.
      - id: "3"
        isCorrect: false
        text: Crear componentes funcionales.
      - id: "4"
        isCorrect: false
        text: Renderizar el DOM del servidor.
  - text: ¿Qué función se usa para definir un store en Pinia?
    explanation: La función `defineStore()` se utiliza para crear un
      nuevo store en Pinia, que se puede importar y utilizar en diferentes
      componentes de la aplicación.
    explanation_code:
      - code: |-
          import { defineStore } from "pinia";

          export const useCounterStore = defineStore("counter", {
            state: () => ({ count: 0 })
          });
        language: handlebars
    answers:
      - id: "1"
        isCorrect: true
        text: "`defineStore()`"
      - id: "2"
        isCorrect: false
        text: "`createStore()`"
      - id: "3"
        isCorrect: false
        text: "`define()`"
      - id: "4"
        isCorrect: false
        text: "`setStore()`"
  - text: ¿Cuales son las dos sintaxis que ofrece Pinia para definir un store?
    explanation: "Pinia ofrece dos sintaxis para definir un store: la
      options syntax y la setup syntax. La primera es similar a Vuex, mientras
      que la segunda aprovecha las características de Composition API de Vue 3."
    explanation_code:
      - code: |-
          // Options Syntax

          import { defineStore } from "pinia";

          export const useCounterStore = defineStore("counter", {
            state: () => ({ count: 0 }),
            actions: {
              increment() {
                this.count++;
              }
            }
          });
        language: javascript
      - code: |-
          // Setup Syntax

          import { defineStore } from "pinia";
          import { ref } from "vue";

          export const useCounterStore = defineStore("counter", () => {
            const count = ref(0);
            const increment = () => count.value++;
            return { count, increment };
          });
        language: javascript
    answers:
      - id: "1"
        isCorrect: true
        text: options syntax y setup syntax.
      - id: "2"
        isCorrect: false
        text: class syntax y functional syntax.
      - id: "3"
        isCorrect: false
        text: reactive syntax y ref syntax.
      - id: "4"
        isCorrect: false
        text: setup syntax y class syntax.
  - text: Usando la options syntax, ¿qué permite la opción `state` dentro de
      un store en Pinia?
    explanation: Usando la options syntax, la opción `state` define el
      estado inicial del store, que puede ser modificado o accedido por los
      componentes que lo utilizan.
    explanation_code:
      - code: |-
          import { defineStore } from "pinia";

          export const useCounterStore = defineStore("counter", {
            state: () => ({ 
              count: 0,
            })
          });
        language: javascript
    answers:
      - id: "1"
        isCorrect: false
        text: Definir propiedades computadas.
      - id: "2"
        isCorrect: true
        text: Definir el estado inicial del store.
      - id: "3"
        isCorrect: false
        text: Ejecutar acciones del ciclo de vida.
      - id: "4"
        isCorrect: false
        text: Establecer rutas de navegación.
  - text: Usando la options syntax, ¿cómo se define una acción en un store de Pinia?
    explanation: Usando la options syntax, las acciones en Pinia se
      definen dentro de la opción actions, permitiendo ejecutar métodos que
      modifican el estado del store.
    explanation_code:
      - code: |-
          import { defineStore } from "pinia";

          export const useCounterStore = defineStore("counter", {
            state: () => ({ 
              count: 0 
            }),
            actions: {
              increment() {
                this.count++;
              }
            }
          });
        language: javascript
    answers:
      - id: "1"
        isCorrect: false
        text: Dentro de la propiedad `setupActions`.
      - id: "2"
        isCorrect: false
        text: Usando `computed()`.
      - id: "3"
        isCorrect: false
        text: Dentro de la propiedad `option`.
      - id: "4"
        isCorrect: true
        text: Dentro de la propiedad `actions`.
  - text: Usando la setup syntax, ¿como se definen las acciones en un store de Pinia?
    explanation: En Pinia, usando la setup syntax, las acciones se
      definen como funciones dentro del store que modifican el estado del store.
      Estas funciones pueden ser utilizadas en los componentes para cambiar el
      estado del store.
    explanation_code:
      - code: |-
          import { defineStore } from "pinia";
          import { ref } from "vue";

          export const useCounterStore = defineStore("counter", () => {
            const count = ref(0);

            function increment() {
              count.value ++
            }
          });
        language: javascript
    answers:
      - id: "1"
        isCorrect: false
        text: Dentro de la propiedad `actions` del store.
      - id: "2"
        isCorrect: true
        text: Creando funciones dentro del store.
      - id: "3"
        isCorrect: false
        text: Usando `computed()` dentro del store.
      - id: "4"
        isCorrect: false
        text: Dentro de la propiedad `methods` del store.
  - text: Usando la setup syntax, ¿cómo puedes resetear un estado?
    explanation: Para resetear un estado con la setup syntax necesitas
      definir tu propio método `$reset()` dentro del store, que restablezca el
      estado a su configuración inicial.
    explanation_code:
      - code: |-
          export const useCounterStore = defineStore('counter', () => {
            const count = ref(0)

            function $reset() {
              count.value = 0
            }

            return { count, $reset }
          })
        language: javascript
    answers:
      - id: "1"
        isCorrect: true
        text: Definiendo tu propio método reset() en el store
      - id: "2"
        isCorrect: false
        text: Reasignando el estado directamente.
      - id: "3"
        isCorrect: false
        text: Definiendo un getter.
      - id: "4"
        isCorrect: false
        text: Utilizando `defineStore()` nuevamente.
  - text: ¿Cuál es la ventaja de usar la setup syntax en pinia?
    explanation: Con la setup syntax, puedes acceder al estado y
      acciones del store sin necesidad de usar `this`, lo que simplifica el
      código y mejora la legibilidad.
    explanation_code:
      - code: |-
          import { defineStore } from "pinia";
          import { ref, computed } from "vue";

          export const useCounterStore = defineStore("counter", () => {
            const count = ref(0);
            const increment = () => count.value++;
            const decrement = () => count.value--;
            const doubleCount = computed(() => count.value * 2);
            
            return { count, increment, decrement, doubleCount };
          });
        language: javascript
    answers:
      - id: "1"
        isCorrect: false
        text: Mejora el rendimiento de la aplicación.
      - id: "2"
        isCorrect: true
        text: Simplifica el acceso al estado sin `this`.
      - id: "3"
        isCorrect: false
        text: Permite la integración con Vuex.
      - id: "4"
        isCorrect: false
        text: Permite usar solo datos estáticos.
  - text: Usando la options syntax, ¿cuál es el propósito de un getter en Pinia?
    explanation: Los getters en Pinia son propiedades derivadas del
      estado que se recalculan automáticamente cuando sus dependencias cambian.
      Permiten acceder a valores computados basados en el estado del store.
    explanation_code:
      - code: |-
          // Options Syntax
          import { defineStore } from "pinia";

          export const useCounterStore = defineStore("counter", {
            state: () => ({ 
              count: 0 
            }),
            getters: {
              doubleCount: (state) => state.count * 2
            }
          });
        language: javascript
      - code: |-
          // Setup Syntax
          import { defineStore } from "pinia";
          import { computed, ref } from "vue";

          export const useCounterStore = defineStore("counter", () => {
            const count = ref(0);

            const doubleCount = computed(() => count.value * 2)
          });
        language: javascript
    answers:
      - id: "1"
        isCorrect: false
        text: Definir rutas.
      - id: "2"
        isCorrect: true
        text: Calcular un valor computado que depende del estado.
      - id: "3"
        isCorrect: false
        text: Inicializar el estado.
      - id: "4"
        isCorrect: false
        text: Actualizar datos de forma asíncrona.
  - text: ¿Cómo se accede al store desde un componente?
    explanation: Para acceder al store, se importa la función que
      define el store y luego se llama a esa función dentro del componente.
    explanation_code:
      - code: |-
          <script setup>
            import { useCounterStore } from "@/stores/counter";

            const counterStore = useCounterStore();
          </script>
        language: handlebars
    answers:
      - id: "1"
        isCorrect: false
        text: Usando `this.store`.
      - id: "2"
        isCorrect: false
        text: Creando una instancia del store con `new`.
      - id: "3"
        isCorrect: true
        text: Importando y llamando la función del store directamente.
      - id: "4"
        isCorrect: false
        text: Mediante la opción `computed`.
