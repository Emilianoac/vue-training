id: introduction-to-pinia
title: Introduction to Pinia
level: basic
slug: introduction-to-pinia
description: This quiz covers the basics of Pinia, the state manager for Vue 3.
category:
  name: Pinia
  image:
    url: https://res.cloudinary.com/du6pa3pa5/image/upload/v1765247921/vue-training/pinia_6fe4d6accb.png
questions:
  - questionText: What is the main purpose of Pinia in Vue 3?
    correctAnswerExplanation: Pinia is a library for state management in Vue, which
      allows storing and sharing the application state across different
      components.
    correctAnswerCodeExample: []
    answers:
      - id: "1"
        isCorrect: false
        answerText: Integrating third-party components.
      - id: "2"
        isCorrect: true
        answerText: Managing the global state of the application.
      - id: "3"
        isCorrect: false
        answerText: Creating functional components.
      - id: "4"
        isCorrect: false
        answerText: Rendering the server-side DOM.
  - questionText: Which function is used to define a store in Pinia?
    correctAnswerExplanation: The `defineStore()` function is used to create a new
      store in Pinia, which can be imported and used in different components of
      the application.
    correctAnswerCodeExample:
      - code: |-
          import { defineStore } from "pinia";

          export const useCounterStore = defineStore("counter", {
            state: () => ({ count: 0 })
          });
        language: javascript
    answers:
      - id: "1"
        isCorrect: true
        answerText: "`defineStore()`"
      - id: "2"
        isCorrect: false
        answerText: "`createStore()`"
      - id: "3"
        isCorrect: false
        answerText: "`define()`"
      - id: "4"
        isCorrect: false
        answerText: "`setStore()`"
  - questionText: What are the two syntaxes that Pinia offers to define a store?
    correctAnswerExplanation: "Pinia offers two syntaxes to define a store: the
      options syntax and the setup syntax. The first is similar to Vuex, while
      the second takes advantage of Vue 3's Composition API features."
    correctAnswerCodeExample:
      - code: |-
          // Options Syntax

          import { defineStore } from "pinia";

          export const useCounterStore = defineStore("counter", {
            state: () => ({ count: 0 }),
            actions: {
              increment() {
                this.count++;
              }
            }
          });
        language: javascript
      - code: |-
          // Setup Syntax

          import { defineStore } from "pinia";
          import { ref } from "vue";

          export const useCounterStore = defineStore("counter", () => {
            const count = ref(0);
            const increment = () => count.value++;
            return { count, increment };
          });
        language: javascript
    answers:
      - id: "1"
        isCorrect: true
        answerText: options syntax and setup syntax.
      - id: "2"
        isCorrect: false
        answerText: class syntax and functional syntax.
      - id: "3"
        isCorrect: false
        answerText: reactive syntax and ref syntax.
      - id: "4"
        isCorrect: false
        answerText: setup syntax and class syntax.
  - questionText: Using the options syntax, what does the `state` option allow
      within a store in Pinia?
    correctAnswerExplanation: Using the options syntax, the `state` option defines
      the initial state of the store, which can be modified or accessed by the
      components that use it.
    correctAnswerCodeExample:
      - code: |-
          import { defineStore } from "pinia";

          export const useCounterStore = defineStore("counter", {
            state: () => ({ 
              count: 0,
            })
          });
        language: javascript
    answers:
      - id: "1"
        isCorrect: false
        answerText: Defining computed properties.
      - id: "2"
        isCorrect: true
        answerText: Defining the initial state of the store.
      - id: "3"
        isCorrect: false
        answerText: Executing lifecycle actions.
      - id: "4"
        isCorrect: false
        answerText: Setting navigation routes.
  - questionText: Using the options syntax, how do you define an action in a Pinia store?
    correctAnswerExplanation: Using the options syntax, actions in Pinia are defined
      within the actions option, allowing you to execute methods that modify the
      store's state.
    correctAnswerCodeExample:
      - code: |-
          import { defineStore } from "pinia";

          export const useCounterStore = defineStore("counter", {
            state: () => ({ 
              count: 0 
            }),
            actions: {
              increment() {
                this.count++;
              }
            }
          });
        language: javascript
    answers:
      - id: "1"
        isCorrect: false
        answerText: Inside the 'setupActions' property.
      - id: "2"
        isCorrect: false
        answerText: Using `computed()`.
      - id: "3"
        isCorrect: false
        answerText: Inside the 'option' property.
      - id: "4"
        isCorrect: true
        answerText: Inside the 'actions' property.
  - questionText: Using the setup syntax, how are actions defined in a Pinia store?
    correctAnswerExplanation: In Pinia, using the setup syntax, actions are defined
      as functions inside the store that modify the store's state. These
      functions can be used in components to change the store
    correctAnswerCodeExample:
      - code: |-
          import { defineStore } from "pinia";
          import { ref } from "vue";

          export const useCounterStore = defineStore("counter", () => {
            const count = ref(0);

            function increment() {
              count.value ++
            }
          });
        language: javascript
    answers:
      - id: "1"
        isCorrect: false
        answerText: Using the 'actions' property inside the store.
      - id: "2"
        isCorrect: true
        answerText: Creating functions inside the store.
      - id: "3"
        isCorrect: false
        answerText: Using `computed()` inside the store.
      - id: "4"
        isCorrect: false
        answerText: Inside the 'methods' property of the store.
  - questionText: Using the setup syntax, how can you reset a state?
    correctAnswerExplanation: To reset a state with the setup syntax, you need to
      define your own `reset()` method inside the store that resets the state to
      its initial configuration.
    correctAnswerCodeExample:
      - code: |-
          export const useCounterStore = defineStore('counter', () => {
            const count = ref(0)

            function $reset() {
              count.value = 0
            }

            return { count, $reset }
          })
        language: javascript
    answers:
      - id: "1"
        isCorrect: true
        answerText: Defining your own `reset()` method in the store.
      - id: "2"
        isCorrect: false
        answerText: Reassigning the state directly.
      - id: "3"
        isCorrect: false
        answerText: Defining a getter.
      - id: "4"
        isCorrect: false
        answerText: Using `defineStore()` again.
  - questionText: What is the advantage of using the setup syntax in pinia?
    correctAnswerExplanation: With the setup syntax, you can access the store's
      state and actions without needing to use `this`, which simplifies the code
      and improves readability.
    correctAnswerCodeExample:
      - code: |-
          import { defineStore } from "pinia";
          import { ref, computed } from "vue";

          export const useCounterStore = defineStore("counter", () => {
            const count = ref(0);
            const increment = () => count.value++;
            const decrement = () => count.value--;
            const doubleCount = computed(() => count.value * 2);
            
            return { count, increment, decrement, doubleCount };
          });
        language: javascript
    answers:
      - id: "1"
        isCorrect: false
        answerText: Improves application performance.
      - id: "2"
        isCorrect: true
        answerText: Simplifies state access without `this`.
      - id: "3"
        isCorrect: false
        answerText: Allows integration with Vuex.
      - id: "4"
        isCorrect: false
        answerText: Allows using only static data.
  - questionText: Using the options syntax, what is the purpose of a getter in Pinia?
    correctAnswerExplanation: Getters in Pinia are derived properties of the state
      that are automatically recalculated when their dependencies change. They
      allow access to computed values based on the store's state.
    correctAnswerCodeExample:
      - code: |-
          // Options Syntax
          import { defineStore } from "pinia";

          export const useCounterStore = defineStore("counter", {
            state: () => ({ 
              count: 0 
            }),
            getters: {
              doubleCount: (state) => state.count * 2
            }
          });
        language: javascript
      - code: |-
          // Setup Syntax
          import { defineStore } from "pinia";
          import { computed, ref } from "vue";

          export const useCounterStore = defineStore("counter", () => {
            const count = ref(0);

            const doubleCount = computed(() => count.value * 2)
          });
        language: javascript
    answers:
      - id: "1"
        isCorrect: false
        answerText: Defining routes.
      - id: "2"
        isCorrect: true
        answerText: Calculating a computed value that depends on the state.
      - id: "3"
        isCorrect: false
        answerText: Initializing the state.
      - id: "4"
        isCorrect: false
        answerText: Updating data asynchronously.
  - questionText: How do you access the store from a component?
    correctAnswerExplanation: To access the store, you import the function that
      defines the store and then call that function inside the component.
    correctAnswerCodeExample:
      - code: |-
          <script setup>
            import { useCounterStore } from "@/stores/counter";

            const counterStore = useCounterStore();
          </script>
        language: handlebars
    answers:
      - id: "1"
        isCorrect: false
        answerText: Using `this.store`.
      - id: "2"
        isCorrect: false
        answerText: Creating an instance of the store with `new`.
      - id: "3"
        isCorrect: true
        answerText: Importing and calling the store function directly.
      - id: "4"
        isCorrect: false
        answerText: Using the `computed` option.
