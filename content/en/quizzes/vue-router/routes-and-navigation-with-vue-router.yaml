documentId: routes-and-navigation-with-vue-router
title: Routes and navigation with Vue Router
level: intermediate
slug: routes-and-navigation-with-vue-router
description: This quiz focuses on the configuration and usage of Vue Router,
  including defining routes, navigation, and nesting routes in Vue applications.
category:
  name: Vue Router
  image:
    url: https://res.cloudinary.com/du6pa3pa5/image/upload/v1765247921/vue-training/vue_0b0e7956d5.png
questions:
  - text: Which of the following options allows you to configure Vue Router
      to use the HTML5 history mode?
    explanation: "The createWebHistory function allows you to configure
      Vue Router to use the HTML5 history mode, which removes the hash # in the
      URL and allows for clean routes."
    explanation_code:
      - code: |-
          import { createRouter, createWebHistory } from "vue-router";

          import Home from "./views/Home.vue";
          import About from "./views/About.vue";

          const routes = [
            { path: "/", component: Home },
            { path: "/about", component: About }
          ];

          // Create the router with HTML5 history
          const router = createRouter({
            history: createWebHistory(),
            routes
          });

          export default router;
        language: javascript
    answers:
      - id: "1"
        isCorrect: false
        text: "`createWebHashHistory()`"
      - id: "2"
        isCorrect: true
        text: "`createWebHistory()`"
      - id: "3"
        isCorrect: false
        text: "`useHistoryMode()`"
      - id: "4"
        isCorrect: false
        text: "`historyMode: 'html5'`"
  - text: How do you programmatically navigate to a route in Vue Router?
    explanation: To navigate programmatically, you use `router.push()`,
      which allows you to change the current route to the one passed as an
      argument.
    explanation_code:
      - code: |-
          <script setup>
          import { useRouter } from "vue-router";

          const router = useRouter();
           function gotToAbout() {
           router.push("/about");
          }
          </script>

          <template>
            <div>
              <h1>Welcome to the main page</h1>
              <button @click="gotToAbout">Go to About</button>
            </div>
          </template>
        language: handlebars
    answers:
      - id: "1"
        isCorrect: true
        text: Using `router.push()`.
      - id: "2"
        isCorrect: false
        text: Calling `navigate()`.
      - id: "3"
        isCorrect: false
        text: Using `this.navigate()`
      - id: "4"
        isCorrect: false
        text: Modifying `window.location`.
  - text: Which option allows you to define nested routes in Vue Router?
    explanation: The 'children' option allows you to define nested
      routes, where a parent route can have multiple child routes, making it
      easier to create complex navigation structures.
    explanation_code:
      - code: |-
          const routes = [
            {
              path: "/dashboard",
              component: Dashboard,
              children: [
                { path: "profile" component: UserProfile }
              ]
            }
          ];
        language: javascript
    answers:
      - id: "1"
        isCorrect: true
        text: "`children`"
      - id: "2"
        isCorrect: false
        text: "`nestedRoutes`"
      - id: "3"
        isCorrect: false
        text: "`subRoutes`"
      - id: "4"
        isCorrect: false
        text: "`parent`"
  - text: What is the main purpose of Vue Router in a Vue application?
    explanation: Vue Router allows you to manage navigation between
      different views or components in a Vue application, making it easier to
      create single-page applications (SPAs)
    explanation_code: []
    answers:
      - id: "1"
        isCorrect: false
        text: Manage global state.
      - id: "2"
        isCorrect: false
        text: Perform unit tests.
      - id: "3"
        isCorrect: true
        text: Manage navigation between different views.
      - id: "4"
        isCorrect: false
        text: Improve application performance.
  - text: How do you define a route in Vue Router?
    explanation: Routes in Vue Router are defined as objects inside an
      array, specifying the path and the component that should be rendered.
    explanation_code:
      - code: |-
          const routes = [
            { path: "/home", component: Home }
          ];
        language: javascript
    answers:
      - id: "1"
        isCorrect: false
        text: Using `defineRoute()`.
      - id: "2"
        isCorrect: true
        text: By using an object in an array of routes.
      - id: "3"
        isCorrect: false
        text: Using `createRoute()`.
      - id: "4"
        isCorrect: false
        text: Using `addRoute()` in the component.
  - text: Which function is used to create a Vue Router instance?
    explanation: createRouter()` is the function used to create a new
      Vue Router instance, allowing you to define the configuration and routes.
    explanation_code:
      - code: |-
          import { createRouter, createWebHistory } from "vue-router";

          const routes = [
            { path: "/", component: Home },
            { path: "/about", component: About }
          ];

          const router = createRouter({
            history: createWebHistory(),
            routes
          });

          export default router;
        language: javascript
    answers:
      - id: "1"
        isCorrect: true
        text: "`createRouter()`"
      - id: "2"
        isCorrect: false
        text: "`createRouter()`"
      - id: "3"
        isCorrect: false
        text: "`new Router()`"
      - id: "4"
        isCorrect: false
        text: "`setupRouter()`"
  - text: How is navigation implemented with links in Vue Router?
    explanation: The `<router-link>` component is used to create
      navigation links that allow you to change routes without reloading the
      page.
    explanation_code:
      - code: |-
          <template>
            <div>
              <h1>Welcome to the main page</h1>
              <router-link to="/profile">Go to my profile</router-link>
            </div>
          </template>
        language: handlebars
    answers:
      - id: "1"
        isCorrect: false
        text: Using `<a href='/route'>`.
      - id: "2"
        isCorrect: true
        text: Using the `<router-link>` component.
      - id: "3"
        isCorrect: false
        text: Calling `router.navigate()`.
      - id: "4"
        isCorrect: false
        text: Modifying `window.location`.
  - text: How do you set a default subroute in a nested route in Vue Router?
    explanation: "To set a default subroute in a nested route, you
      define a subroute with an empty path `path: ''` inside children. This
      causes Vue Router to automatically load the default subroute when the user
      accesses the parent route without changing the URL."
    explanation_code:
      - code: |-
          const routes = [
            {
              path: "/dashboard",
              component: Dashboard,
              children: [
                { path: "", component: Profile } // Default subroute
              ]
            }
          ];
        language: javascript
    answers:
      - id: "1"
        isCorrect: false
        text: "Defining a `default: true` property."
      - id: "2"
        isCorrect: false
        text: Using the `default` attribute in `children`.
      - id: "3"
        isCorrect: true
        text: "Defining a subroute with an empty path `path: ' '`."
      - id: "4"
        isCorrect: false
        text: Using the `defaultRoute` attribute.
  - text: How can you define a dynamic route in Vue Router?
    explanation: In Vue Router, a dynamic route is defined using
      dynamic parameters, which are indicated with a colon `:` followed by the
      parameter name.
    explanation_code:
      - code: |-
          import { createRouter, createWebHistory } from "vue-router";

          const routes = [
            {
              path: "/user/:id" // Dynamic route with :id parameter
              name: "UserProfile",
              component: () => import('@/views/UserProfile.vue')
            },
          ];

          const router = createRouter({
            history: createWebHistory(),
            routes,
          });

          export default router;
        language: javascript
    answers:
      - id: "1"
        isCorrect: false
        text: Using brackets `[ ]`.
      - id: "2"
        isCorrect: false
        text: With an asterisk `*`.
      - id: "3"
        isCorrect: false
        text: Using parentheses `( )`.
      - id: "4"
        isCorrect: true
        text: With a colon `:` followed by the parameter name.
  - text: How can you lazily load a component in a Vue Router route?
    explanation: To lazily load a component in a Vue Router route, you
      use a dynamic import function that returns a promise with the component.
    explanation_code:
      - code: |-
          const routes = [
            {
              path: "/about",
              component: () => import("./views/About.vue") // Lazy loading
            }
          ];
        language: javascript
    answers:
      - id: "1"
        isCorrect: false
        text: Importing the component with the `loadComponent()` function.
      - id: "2"
        isCorrect: false
        text: Importing the component with the `dynamicImport()` function.
      - id: "3"
        isCorrect: false
        text: Importing the component with the `import()` function.
      - id: "4"
        isCorrect: true
        text: Importing the component with `() => import(...)`.
