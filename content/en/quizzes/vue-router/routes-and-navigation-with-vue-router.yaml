id: routes-and-navigation-with-vue-router
title: Routes and navigation with Vue Router
level: intermediate
slug: routes-and-navigation-with-vue-router
description: This quiz focuses on the configuration and usage of Vue Router,
  including defining routes, navigation, and nesting routes in Vue applications.
category:
  name: Vue Router
  image:
    url: https://res.cloudinary.com/du6pa3pa5/image/upload/v1765247921/vue-training/vue_0b0e7956d5.png
questions:
  - questionText: Which of the following options allows you to configure Vue Router
      to use the HTML5 history mode?
    correctAnswerExplanation: "The createWebHistory function allows you to configure
      Vue Router to use the HTML5 history mode, which removes the hash # in the
      URL and allows for clean routes."
    correctAnswerCodeExample:
      - code: |-
          import { createRouter, createWebHistory } from "vue-router";

          import Home from "./views/Home.vue";
          import About from "./views/About.vue";

          const routes = [
            { path: "/", component: Home },
            { path: "/about", component: About }
          ];

          // Create the router with HTML5 history
          const router = createRouter({
            history: createWebHistory(),
            routes
          });

          export default router;
        language: javascript
    answers:
      - id: "1"
        isCorrect: false
        answerText: "`createWebHashHistory()`"
      - id: "2"
        isCorrect: true
        answerText: "`createWebHistory()`"
      - id: "3"
        isCorrect: false
        answerText: "`useHistoryMode()`"
      - id: "4"
        isCorrect: false
        answerText: "`historyMode: 'html5'`"
  - questionText: How do you programmatically navigate to a route in Vue Router?
    correctAnswerExplanation: To navigate programmatically, you use `router.push()`,
      which allows you to change the current route to the one passed as an
      argument.
    correctAnswerCodeExample:
      - code: |-
          <script setup>
          import { useRouter } from "vue-router";

          const router = useRouter();
           function gotToAbout() {
           router.push("/about");
          }
          </script>

          <template>
            <div>
              <h1>Welcome to the main page</h1>
              <button @click="gotToAbout">Go to About</button>
            </div>
          </template>
        language: handlebars
    answers:
      - id: "1"
        isCorrect: true
        answerText: Using `router.push()`.
      - id: "2"
        isCorrect: false
        answerText: Calling `navigate()`.
      - id: "3"
        isCorrect: false
        answerText: Using `this.navigate()`
      - id: "4"
        isCorrect: false
        answerText: Modifying `window.location`.
  - questionText: Which option allows you to define nested routes in Vue Router?
    correctAnswerExplanation: The 'children' option allows you to define nested
      routes, where a parent route can have multiple child routes, making it
      easier to create complex navigation structures.
    correctAnswerCodeExample:
      - code: |-
          const routes = [
            {
              path: "/dashboard",
              component: Dashboard,
              children: [
                { path: "profile" component: UserProfile }
              ]
            }
          ];
        language: javascript
    answers:
      - id: "1"
        isCorrect: true
        answerText: "`children`"
      - id: "2"
        isCorrect: false
        answerText: "`nestedRoutes`"
      - id: "3"
        isCorrect: false
        answerText: "`subRoutes`"
      - id: "4"
        isCorrect: false
        answerText: "`parent`"
  - questionText: What is the main purpose of Vue Router in a Vue application?
    correctAnswerExplanation: Vue Router allows you to manage navigation between
      different views or components in a Vue application, making it easier to
      create single-page applications (SPAs)
    correctAnswerCodeExample: []
    answers:
      - id: "1"
        isCorrect: false
        answerText: Manage global state.
      - id: "2"
        isCorrect: false
        answerText: Perform unit tests.
      - id: "3"
        isCorrect: true
        answerText: Manage navigation between different views.
      - id: "4"
        isCorrect: false
        answerText: Improve application performance.
  - questionText: How do you define a route in Vue Router?
    correctAnswerExplanation: Routes in Vue Router are defined as objects inside an
      array, specifying the path and the component that should be rendered.
    correctAnswerCodeExample:
      - code: |-
          const routes = [
            { path: "/home", component: Home }
          ];
        language: javascript
    answers:
      - id: "1"
        isCorrect: false
        answerText: Using `defineRoute()`.
      - id: "2"
        isCorrect: true
        answerText: By using an object in an array of routes.
      - id: "3"
        isCorrect: false
        answerText: Using `createRoute()`.
      - id: "4"
        isCorrect: false
        answerText: Using `addRoute()` in the component.
  - questionText: Which function is used to create a Vue Router instance?
    correctAnswerExplanation: createRouter()` is the function used to create a new
      Vue Router instance, allowing you to define the configuration and routes.
    correctAnswerCodeExample:
      - code: |-
          import { createRouter, createWebHistory } from "vue-router";

          const routes = [
            { path: "/", component: Home },
            { path: "/about", component: About }
          ];

          const router = createRouter({
            history: createWebHistory(),
            routes
          });

          export default router;
        language: javascript
    answers:
      - id: "1"
        isCorrect: true
        answerText: "`createRouter()`"
      - id: "2"
        isCorrect: false
        answerText: "`createRouter()`"
      - id: "3"
        isCorrect: false
        answerText: "`new Router()`"
      - id: "4"
        isCorrect: false
        answerText: "`setupRouter()`"
  - questionText: How is navigation implemented with links in Vue Router?
    correctAnswerExplanation: The `<router-link>` component is used to create
      navigation links that allow you to change routes without reloading the
      page.
    correctAnswerCodeExample:
      - code: |-
          <template>
            <div>
              <h1>Welcome to the main page</h1>
              <router-link to="/profile">Go to my profile</router-link>
            </div>
          </template>
        language: handlebars
    answers:
      - id: "1"
        isCorrect: false
        answerText: Using `<a href='/route'>`.
      - id: "2"
        isCorrect: true
        answerText: Using the `<router-link>` component.
      - id: "3"
        isCorrect: false
        answerText: Calling `router.navigate()`.
      - id: "4"
        isCorrect: false
        answerText: Modifying `window.location`.
  - questionText: How do you set a default subroute in a nested route in Vue Router?
    correctAnswerExplanation: "To set a default subroute in a nested route, you
      define a subroute with an empty path `path: ''` inside children. This
      causes Vue Router to automatically load the default subroute when the user
      accesses the parent route without changing the URL."
    correctAnswerCodeExample:
      - code: |-
          const routes = [
            {
              path: "/dashboard",
              component: Dashboard,
              children: [
                { path: "", component: Profile } // Default subroute
              ]
            }
          ];
        language: javascript
    answers:
      - id: "1"
        isCorrect: false
        answerText: "Defining a `default: true` property."
      - id: "2"
        isCorrect: false
        answerText: Using the `default` attribute in `children`.
      - id: "3"
        isCorrect: true
        answerText: "Defining a subroute with an empty path `path: ' '`."
      - id: "4"
        isCorrect: false
        answerText: Using the `defaultRoute` attribute.
  - questionText: How can you define a dynamic route in Vue Router?
    correctAnswerExplanation: In Vue Router, a dynamic route is defined using
      dynamic parameters, which are indicated with a colon `:` followed by the
      parameter name.
    correctAnswerCodeExample:
      - code: |-
          import { createRouter, createWebHistory } from "vue-router";

          const routes = [
            {
              path: "/user/:id" // Dynamic route with :id parameter
              name: "UserProfile",
              component: () => import('@/views/UserProfile.vue')
            },
          ];

          const router = createRouter({
            history: createWebHistory(),
            routes,
          });

          export default router;
        language: javascript
    answers:
      - id: "1"
        isCorrect: false
        answerText: Using brackets `[ ]`.
      - id: "2"
        isCorrect: false
        answerText: With an asterisk `*`.
      - id: "3"
        isCorrect: false
        answerText: Using parentheses `( )`.
      - id: "4"
        isCorrect: true
        answerText: With a colon `:` followed by the parameter name.
  - questionText: How can you lazily load a component in a Vue Router route?
    correctAnswerExplanation: To lazily load a component in a Vue Router route, you
      use a dynamic import function that returns a promise with the component.
    correctAnswerCodeExample:
      - code: |-
          const routes = [
            {
              path: "/about",
              component: () => import("./views/About.vue") // Lazy loading
            }
          ];
        language: javascript
    answers:
      - id: "1"
        isCorrect: false
        answerText: Importing the component with the `loadComponent()` function.
      - id: "2"
        isCorrect: false
        answerText: Importing the component with the `dynamicImport()` function.
      - id: "3"
        isCorrect: false
        answerText: Importing the component with the `import()` function.
      - id: "4"
        isCorrect: true
        answerText: Importing the component with `() => import(...)`.
